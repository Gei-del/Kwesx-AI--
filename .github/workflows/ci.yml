name: CI — Kwesx AI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint y formateo ────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + mypy + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias de desarrollo
        run: |
          pip install --upgrade pip
          pip install flake8 mypy isort black
          pip install -r requirements.txt

      - name: Verificar formato con black
        run: black backend/ etl/ ml/ --check --line-length=100

      - name: Verificar imports con isort
        run: isort backend/ etl/ ml/ --check-only --profile=black

      - name: Lint con flake8
        run: flake8 backend/ etl/ ml/ --max-line-length=100 --exclude=__pycache__,ml/models

      - name: Type check con mypy
        run: mypy backend/ ml/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # No bloqueante hasta tener tipos completos

  # ── Tests unitarios ────────────────────────────────────────────────────────
  test-unit:
    name: Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Correr tests unitarios (sin integración)
        run: |
          python -m pytest tests/ -v -m "not integration and not slow" \
            --tb=short \
            --cov=backend --cov=ml --cov=etl \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Subir coverage a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: reports/coverage.xml
          fail_ci_if_error: false

  # ── Frontend ───────────────────────────────────────────────────────────────
  test-frontend:
    name: Build + Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: cd frontend && npm ci

      - name: TypeScript type-check
        run: cd frontend && npm run type-check

      - name: Lint ESLint
        run: cd frontend && npm run lint

      - name: Build de producción
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Resumen ────────────────────────────────────────────────────────────────
  ci-status:
    name: Estado CI
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-frontend]
    if: always()
    steps:
      - name: Verificar resultado
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]]; then
            echo "❌ Lint falló"
            exit 1
          fi
          if [[ "${{ needs.test-unit.result }}" == "failure" ]]; then
            echo "❌ Tests unitarios fallaron"
            exit 1
          fi
          if [[ "${{ needs.test-frontend.result }}" == "failure" ]]; then
            echo "❌ Build frontend falló"
            exit 1
          fi
          echo "✅ Todos los checks pasaron"
