name: Deploy — Kwesx AI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  # ── Deploy Frontend a Vercel ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: cd frontend && npm ci

      - name: Build de producción
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL_PRODUCCION }}

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"

  # ── Deploy Backend a Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"

  # ── Notificación ──────────────────────────────────────────────────────────
  notify:
    name: Notificar deploy
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Estado del deploy
        run: |
          if [[ "${{ needs.deploy-frontend.result }}" == "success" && \
                "${{ needs.deploy-backend.result }}" == "success" ]]; then
            echo "✅ Deploy exitoso en producción"
          else
            echo "⚠️  Deploy parcial o fallido — revisar logs"
          fi
