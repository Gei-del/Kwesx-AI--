# ============================================================
# Kwesx AI — Docker Compose
# Levanta PostgreSQL+PostGIS y el backend FastAPI.
#
# Uso:
#   docker compose up -d          # levantar todo
#   docker compose down           # apagar
#   docker compose logs -f api    # ver logs del backend
#
# Variables requeridas en .env (copiar desde .env.example):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # Base de datos: PostgreSQL 15 con extensión PostGIS
  # ----------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    container_name: kwesx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kwesx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kwesx_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-kwesx_db}
    ports:
      # Puerto 5433 en el host para no chocar con PostgreSQL local (5432)
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kwesx} -d ${POSTGRES_DB:-kwesx_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kwesx-network

  # ----------------------------------------------------------
  # Backend: FastAPI
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kwesx_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kwesx}:${POSTGRES_PASSWORD:-kwesx_dev_2026}@db:5432/${POSTGRES_DB:-kwesx_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-kwesx}:${POSTGRES_PASSWORD:-kwesx_dev_2026}@db:5432/${POSTGRES_DB:-kwesx_db}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /app/venv           # excluir venv del bind mount
      - /app/frontend       # excluir frontend del bind mount
      - /app/.git           # excluir .git del bind mount
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kwesx-network

volumes:
  pgdata:
    driver: local

networks:
  kwesx-network:
    driver: bridge
